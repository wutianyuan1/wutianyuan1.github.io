<!-- Publication list styles -->
<style>
.pub-item {
  margin-bottom: 1.5em;
  line-height: 1.6;
}
.pub-badge {
  display: inline-block;
  padding: 1px 8px;
  margin-right: 6px;
  font-size: 0.75em;
  font-weight: 700;
  color: #fff;
  border-radius: 4px;
  vertical-align: middle;
  letter-spacing: 0.3px;
  white-space: nowrap;
}
.pub-badge-osdi  { background-color: #1a5276; }
.pub-badge-nsdi  { background-color: #117a65; }
.pub-badge-atc   { background-color: #2874a6; }
.pub-badge-mlsys { background-color: #6c3483; }
.pub-badge-socc  { background-color: #1e8449; }
.pub-badge-icdcs { background-color: #b7950b; }
.pub-badge-tpds  { background-color: #196f3d; }
.pub-badge-arxiv { background-color: #7f8c8d; }
.pub-authors {
  font-size: 0.92em;
  color: #333;
}
.pub-title {
  font-weight: 700;
  font-size: 1.05em;
  margin: 2px 0;
}
.pub-title a {
  color: #494e52;
  text-decoration: none;
}
.pub-title a:hover {
  color: #52adc8;
  text-decoration: underline;
}
.pub-venue {
  font-size: 0.88em;
  color: #666;
  font-style: italic;
}
.pub-links {
  font-size: 0.82em;
  font-style: normal;
}
.pub-links a {
  color: #52adc8;
  margin-left: 4px;
  text-decoration: none;
}
.pub-links a:hover {
  text-decoration: underline;
}
.pub-award {
  display: inline-block;
  font-size: 0.78em;
  font-weight: 600;
  color: #c0392b;
  margin-left: 6px;
  vertical-align: middle;
}
</style>
